<style>
  .fa-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px;
  }
  .fa-item{
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .fa-item .fa-thumb{
    aspect-ratio:1/1;
    display:block;
    width:100%;
    border:3px solid var(--ink);
    border-radius:20px;
    overflow:hidden;
    background:#fff;
    box-shadow:6px 6px 0 rgba(0,0,0,0.08);
  }
  .fa-item img{
    width:100%; height:100%; object-fit:contain; display:block;
    cursor:zoom-in;
  }
  .fa-credit{
    font-family:'Baloo 2'; font-weight:700; font-size:14px;
    text-align:center; padding:8px 20px;
    border:3px solid var(--ink);
    border-radius:999px;
    background:var(--sun);
    text-decoration:none; color:#000000;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .fa-credit:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:4px 6px 0 rgba(0,0,0,0.18);
  }
  .fa-credit.no-link{ cursor:default; }
  .fa-credit.no-link:hover{ transform:none; box-shadow:none; }
  .lightbox{
    position:fixed; inset:0; z-index:100;
    background:rgba(36,27,47,0.88);
    display:none; align-items:center; justify-content:center;
    padding:32px; cursor:zoom-out;
  }
  .lightbox.open{ display:flex; }
  .lightbox img{
    max-width:92vw; max-height:88vh;
    border-radius:16px;
    box-shadow:0 10px 0 rgba(0,0,0,0.25);
  }
  .lightbox-close{
    position:fixed; top:20px; right:28px;
    font-family:'Baloo 2'; font-weight:800; font-size:28px;
    color:var(--paper); background:none; border:none; cursor:pointer;
    line-height:1;
  }
</style>

<script>
  function openLightbox(src){
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox(){
    document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){ closeLightbox(); }
  });
</script>
